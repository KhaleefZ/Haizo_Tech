      summary: Your own full profile
      description: Like /auth/me but includes the editable `bio` the session view omits.
      tags: [Admin]
      responses:
        '200':
          description: Your profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminProfile' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }
    patch:
      operationId: adminUpdateProfile
      summary: Update your own profile
      description: Self-service — any signed-in user can edit their own name, bio, avatar and notification preference.
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateProfile' }
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminProfile' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/me/password:
    post:
      operationId: adminChangePassword
      summary: Change your own password
      description: |
        Verifies the current password, stores the new hash, and rotates the
        session so the change takes effect immediately without logging you out.
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangePassword' }
      responses:
        '204':
          description: Password changed; session cookies rotated
          headers:
            Set-Cookie:
              description: rotated hz_at, hz_rt and hz_csrf
              schema: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/users:
    get:
      operationId: adminListUsers
      summary: List team members
      description: Available to managers and above (used for task assignment). Changing roles is super-admin only.
      tags: [Admin]
      responses:
        '200':
          description: All team members
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminUserList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/users/{id}:
    patch:
      operationId: adminUpdateUserRole
      summary: Change a team member's role
      description: |
        Super-admin only. You cannot change your own role — that prevents an admin
        accidentally locking themselves (and possibly everyone) out of user
        management.
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateUserRole' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminUser' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: hz_at

  parameters:
    Page:
      name: page
      in: query
      required: false
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: pageSize
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    Slug:
      name: slug
      in: path
      required: true
      schema: { $ref: '#/components/schemas/Slug' }
    IdParam:
      name: id
      in: path
      required: true
      schema: { type: string, minLength: 1, maxLength: 40 }

  responses:
    BadRequest:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Authenticated but not permitted
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: No such resource
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Conflicts with existing data (e.g. a duplicate slug)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ServiceUnavailable:
      description: A dependency (e.g. object storage) isn't configured
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Slug:
      type: string
      pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
      maxLength: 120
      examples: ['custom-software']

    Error:
      type: object
      description: The one and only error shape returned by this API.
      required: [error]
      additionalProperties: false
      properties:
        error:
          type: object
          required: [code, message]
          additionalProperties: false
          properties:
            code:
              type: string
              description: Stable, machine-readable. Safe to branch on.
              examples: ['VALIDATION_FAILED']
            message:
              type: string
              description: Human-readable. Never contains a stack trace or SQL.
            details:
              type: array
              description: Present on validation failures — one entry per bad field.
              items: { $ref: '#/components/schemas/ErrorDetail' }
            requestId:
              type: string
              description: Correlates with server logs.

    ErrorDetail:
      type: object
      required: [path, message]
      additionalProperties: false
      properties:
        path: { type: string, examples: ['email'] }
        message: { type: string, examples: ['Enter a valid email address'] }

    PageMeta:
      type: object
      required: [page, pageSize, total, totalPages, hasNext]
      additionalProperties: false
      properties:
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
        hasNext: { type: boolean }

    Health:
      type: object
      required: [status, uptimeSeconds, version]
      additionalProperties: false
      properties:
        status: { type: string, enum: [ok, degraded] }
        uptimeSeconds: { type: number, minimum: 0 }
        version: { type: string }
        checks:
          type: object
          additionalProperties: { type: string }

    Service:
      type: object
      required: [id, slug, title, summary, stack, deliverables, order, published]
      additionalProperties: false
      properties:
        id: { type: string }
        slug: { $ref: '#/components/schemas/Slug' }
        title: { type: string, maxLength: 120 }
        summary: { type: string, maxLength: 400 }
        body: { type: [string, 'null'] }
        icon: { type: [string, 'null'] }
        stack:
          type: array
          items: { type: string }
        deliverables:
          type: array
          items: { type: string }
        timeline: { type: [string, 'null'] }
        order: { type: integer }
        published: { type: boolean }
        seoTitle: { type: [string, 'null'] }
        seoDescription: { type: [string, 'null'] }

    ServiceList:
      type: object
      required: [data, meta]
      additionalProperties: false
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Service' }
        meta: { $ref: '#/components/schemas/PageMeta' }

    WorkCategory:
      type: object
      required: [id, slug, name, order]
      additionalProperties: false
      properties:
        id: { type: string }
        slug: { $ref: '#/components/schemas/Slug' }
        name: { type: string, maxLength: 60 }
        order: { type: integer }

    WorkCategoryList:
      type: object
      required: [data]
      additionalProperties: false
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/WorkCategory' }

    CreateInquiry:
      type: object
      required: [name, email, message, consent]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 2, maxLength: 120 }
        email: { type: string, format: email, maxLength: 200 }
        phone: { type: [string, 'null'], maxLength: 30 }
        company: { type: [string, 'null'], maxLength: 120 }
        projectType:
          type: [string, 'null']
          enum:
            [
              custom-software,
              ai-intelligent-systems,
              web-mobile-apps,
              infrastructure-security,
              not-sure,
              null,
            ]
        budgetRange:
          type: [string, 'null']
          enum: [under-2l, 2-5l, 5-15l, 15l-plus, not-sure, null]
        message: { type: string, minLength: 10, maxLength: 5000 }
        consent:
          type: boolean
          const: true
          description: DPDP/GDPR consent. Must be true; false is a validation failure.
        website:
          type: [string, 'null']
          description: Honeypot. Must be empty or absent for a real submission.
          maxLength: 200

    InquiryReceipt:
      type: object
      required: [id, receivedAt]
      additionalProperties: false
      properties:
        id: { type: string }
        receivedAt: { type: string, format: date-time }

    Industry:
      type: object
      required: [id, slug, name, capability, order]
      additionalProperties: false
      properties:
        id: { type: string }
        slug: { $ref: '#/components/schemas/Slug' }
        name: { type: string, maxLength: 80 }
        capability: { type: string, maxLength: 300 }
        icon: { type: [string, 'null'] }
        order: { type: integer }

    IndustryList:
      type: object
      required: [data]
      additionalProperties: false
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Industry' }

    Testimonial:
      type: object
      required: [id, author, quote, order]
      additionalProperties: false
      properties:
        id: { type: string }
        author: { type: string, maxLength: 120 }
        role: { type: [string, 'null'] }
        company: { type: [string, 'null'] }
        quote: { type: string, maxLength: 2000 }
        avatarUrl: { type: [string, 'null'] }
        verifiedAt: { type: [string, 'null'], format: date-time }
        order: { type: integer }

    TestimonialList:
      type: object
      required: [data]
      additionalProperties: false
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Testimonial' }

    Work:
      type: object
      required: [id, title, category, description, imageUrls]
      additionalProperties: false
      properties:
        id: { type: string }
        title: { type: string, maxLength: 200 }
        category: { type: string, maxLength: 80 }
        description: { type: string }
        imageUrls:
          type: array
          items: { type: string }
        liveUrl: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }

    WorkList:
      type: object
      required: [data, meta]
      additionalProperties: false
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Work' }
        meta: { $ref: '#/components/schemas/PageMeta' }

    BlogPost:
      type: object
      required: [id, title, content, tags, createdAt]
      additionalProperties: false
      properties:
        id: { type: string }
        title: { type: string, maxLength: 250 }
        content: { type: string }
        tags:
          type: array
          items: { type: string }
        imageUrl: { type: [string, 'null'] }
        authorName: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }

    BlogPostList:
      type: object
      required: [data, meta]
      additionalProperties: false
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/BlogPost' }
        meta: { $ref: '#/components/schemas/PageMeta' }

    Role:
      type: string
      enum: [SUPER_ADMIN, MANAGER, DEV]
      description: |
        Matches the live database exactly. REDESIGN.md's ADMIN/EDITOR naming was a sketch;
        renaming a production enum for a document would be risk with no user value.

    LoginRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email: { type: string, format: email, maxLength: 200 }
        password: { type: string, minLength: 8, maxLength: 200 }

    CurrentUser:
      type: object
      required: [id, email, name, role]
      additionalProperties: false
      properties:
        id: { type: string }
        email: { type: string, format: email }
        name: { type: string }
        role: { $ref: '#/components/schemas/Role' }
        avatarUrl: { type: [string, 'null'] }
        notificationsEnabled: { type: boolean }

    AdminService:
      type: object
      description: |
        The full service row as the admin sees it — including drafts and the
        internal fields (publish state, timestamps) the public Service omits.
      required:
        [id, slug, title, summary, stack, deliverables, order, published, createdAt, updatedAt]
      additionalProperties: false
