            application/json:
              schema: { $ref: '#/components/schemas/AdminBlogList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }
    post:
      operationId: adminCreateBlog
      summary: Create a blog post
      description: The author is the signed-in user; it is not accepted from the client.
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateBlog' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminBlog' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/blog/{id}:
    get:
      operationId: adminGetBlog
      summary: Get one blog post by id
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: The post
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminBlog' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
    patch:
      operationId: adminUpdateBlog
      summary: Update a blog post
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateBlog' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminBlog' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
    delete:
      operationId: adminDeleteBlog
      summary: Delete a blog post
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/inquiries:
    get:
      operationId: adminListInquiries
      summary: List contact enquiries
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          required: false
          schema: { $ref: '#/components/schemas/InquiryStatus' }
      responses:
        '200':
          description: A page of enquiries
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminInquiryList' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/inquiries/{id}:
    get:
      operationId: adminGetInquiry
      summary: Get one enquiry
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: The enquiry
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminInquiry' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
    patch:
      operationId: adminUpdateInquiry
      summary: Update an enquiry's status
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateInquiry' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminInquiry' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
    delete:
      operationId: adminDeleteInquiry
      summary: Delete an enquiry
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: hz_at

  parameters:
    Page:
      name: page
      in: query
      required: false
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: pageSize
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    Slug:
      name: slug
      in: path
      required: true
      schema: { $ref: '#/components/schemas/Slug' }
    IdParam:
      name: id
      in: path
      required: true
      schema: { type: string, minLength: 1, maxLength: 40 }

  responses:
    BadRequest:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Authenticated but not permitted
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: No such resource
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Conflicts with existing data (e.g. a duplicate slug)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Slug:
      type: string
      pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
      maxLength: 120
      examples: ['custom-software']

    Error:
      type: object
      description: The one and only error shape returned by this API.
      required: [error]
      additionalProperties: false
      properties:
        error:
          type: object
          required: [code, message]
          additionalProperties: false
          properties:
            code:
              type: string
              description: Stable, machine-readable. Safe to branch on.
              examples: ['VALIDATION_FAILED']
            message:
              type: string
              description: Human-readable. Never contains a stack trace or SQL.
            details:
              type: array
              description: Present on validation failures — one entry per bad field.
              items: { $ref: '#/components/schemas/ErrorDetail' }
            requestId:
              type: string
              description: Correlates with server logs.

    ErrorDetail:
      type: object
      required: [path, message]
      additionalProperties: false
      properties:
        path: { type: string, examples: ['email'] }
        message: { type: string, examples: ['Enter a valid email address'] }

    PageMeta:
      type: object
      required: [page, pageSize, total, totalPages, hasNext]
      additionalProperties: false
      properties:
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
        hasNext: { type: boolean }

    Health:
      type: object
      required: [status, uptimeSeconds, version]
      additionalProperties: false
      properties:
        status: { type: string, enum: [ok, degraded] }
        uptimeSeconds: { type: number, minimum: 0 }
        version: { type: string }
        checks:
          type: object
          additionalProperties: { type: string }

    Service:
      type: object
      required: [id, slug, title, summary, stack, deliverables, order, published]
      additionalProperties: false
      properties:
        id: { type: string }
        slug: { $ref: '#/components/schemas/Slug' }
        title: { type: string, maxLength: 120 }
        summary: { type: string, maxLength: 400 }
        body: { type: [string, 'null'] }
        icon: { type: [string, 'null'] }
        stack:
          type: array
          items: { type: string }
        deliverables:
          type: array
          items: { type: string }
        timeline: { type: [string, 'null'] }
        order: { type: integer }
        published: { type: boolean }
        seoTitle: { type: [string, 'null'] }
        seoDescription: { type: [string, 'null'] }

    ServiceList:
      type: object
      required: [data, meta]
      additionalProperties: false
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Service' }
        meta: { $ref: '#/components/schemas/PageMeta' }

    WorkCategory:
      type: object
      required: [id, slug, name, order]
      additionalProperties: false
      properties:
        id: { type: string }
        slug: { $ref: '#/components/schemas/Slug' }
        name: { type: string, maxLength: 60 }
        order: { type: integer }

    WorkCategoryList:
      type: object
      required: [data]
      additionalProperties: false
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/WorkCategory' }

    CreateInquiry:
      type: object
      required: [name, email, message, consent]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 2, maxLength: 120 }
        email: { type: string, format: email, maxLength: 200 }
        phone: { type: [string, 'null'], maxLength: 30 }
        company: { type: [string, 'null'], maxLength: 120 }
        projectType:
          type: [string, 'null']
          enum:
            [
              custom-software,
              ai-intelligent-systems,
              web-mobile-apps,
              infrastructure-security,
              not-sure,
              null,
            ]
        budgetRange:
          type: [string, 'null']
          enum: [under-2l, 2-5l, 5-15l, 15l-plus, not-sure, null]
        message: { type: string, minLength: 10, maxLength: 5000 }
        consent:
          type: boolean
          const: true
          description: DPDP/GDPR consent. Must be true; false is a validation failure.
        website:
          type: [string, 'null']
          description: Honeypot. Must be empty or absent for a real submission.
          maxLength: 200

    InquiryReceipt:
      type: object
      required: [id, receivedAt]
      additionalProperties: false
      properties:
        id: { type: string }
        receivedAt: { type: string, format: date-time }

    Industry:
      type: object
      required: [id, slug, name, capability, order]
      additionalProperties: false
      properties:
        id: { type: string }
        slug: { $ref: '#/components/schemas/Slug' }
        name: { type: string, maxLength: 80 }
        capability: { type: string, maxLength: 300 }
        icon: { type: [string, 'null'] }
        order: { type: integer }

    IndustryList:
      type: object
      required: [data]
      additionalProperties: false
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Industry' }

    Testimonial:
      type: object
      required: [id, author, quote, order]
      additionalProperties: false
      properties:
        id: { type: string }
        author: { type: string, maxLength: 120 }
        role: { type: [string, 'null'] }
        company: { type: [string, 'null'] }
        quote: { type: string, maxLength: 2000 }
        avatarUrl: { type: [string, 'null'] }
        verifiedAt: { type: [string, 'null'], format: date-time }
        order: { type: integer }

    TestimonialList:
      type: object
      required: [data]
      additionalProperties: false
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Testimonial' }

    Work:
      type: object
      required: [id, title, category, description, imageUrls]
      additionalProperties: false
      properties:
        id: { type: string }
        title: { type: string, maxLength: 200 }
        category: { type: string, maxLength: 80 }
        description: { type: string }
        imageUrls:
          type: array
          items: { type: string }
        liveUrl: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }

    WorkList:
      type: object
      required: [data, meta]
      additionalProperties: false
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Work' }
        meta: { $ref: '#/components/schemas/PageMeta' }

    BlogPost:
      type: object
      required: [id, title, content, tags, createdAt]
      additionalProperties: false
      properties:
        id: { type: string }
        title: { type: string, maxLength: 250 }
        content: { type: string }
        tags:
          type: array
          items: { type: string }
        imageUrl: { type: [string, 'null'] }
        authorName: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }

    BlogPostList:
      type: object
      required: [data, meta]
      additionalProperties: false
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/BlogPost' }
        meta: { $ref: '#/components/schemas/PageMeta' }

    Role:
      type: string
      enum: [SUPER_ADMIN, MANAGER, DEV]
      description: |
        Matches the live database exactly. REDESIGN.md's ADMIN/EDITOR naming was a sketch;
        renaming a production enum for a document would be risk with no user value.

    LoginRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email: { type: string, format: email, maxLength: 200 }
        password: { type: string, minLength: 8, maxLength: 200 }

    CurrentUser:
      type: object
      required: [id, email, name, role]
      additionalProperties: false
      properties:
        id: { type: string }
        email: { type: string, format: email }
        name: { type: string }
        role: { $ref: '#/components/schemas/Role' }
        avatarUrl: { type: [string, 'null'] }
        notificationsEnabled: { type: boolean }

    AdminService:
      type: object
      description: |
        The full service row as the admin sees it — including drafts and the
        internal fields (publish state, timestamps) the public Service omits.
      required:
        [id, slug, title, summary, stack, deliverables, order, published, createdAt, updatedAt]
      additionalProperties: false
      properties:
        id: { type: string }
        slug: { $ref: '#/components/schemas/Slug' }
        title: { type: string, maxLength: 120 }
        summary: { type: string, maxLength: 400 }
        body: { type: [string, 'null'] }
        icon: { type: [string, 'null'] }
        stack: { type: array, items: { type: string } }
        deliverables: { type: array, items: { type: string } }
        timeline: { type: [string, 'null'] }
        order: { type: integer }
        published: { type: boolean }
        publishedAt: { type: [string, 'null'], format: date-time }
        seoTitle: { type: [string, 'null'] }
        seoDescription: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AdminServiceList:
      type: object
      required: [data, meta]
      additionalProperties: false
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/AdminService' }
        meta: { $ref: '#/components/schemas/PageMeta' }

    CreateService:
      type: object
      required: [slug, title, summary]
      additionalProperties: false
      properties:
        slug: { $ref: '#/components/schemas/Slug' }
        title: { type: string, minLength: 2, maxLength: 120 }
        summary: { type: string, minLength: 2, maxLength: 400 }
        body: { type: [string, 'null'], maxLength: 20000 }
        icon: { type: [string, 'null'], maxLength: 60 }
        stack:
          type: array
          items: { type: string, maxLength: 60 }
        deliverables:
          type: array
          items: { type: string, maxLength: 200 }
        timeline: { type: [string, 'null'], maxLength: 120 }
        order: { type: integer, minimum: 0 }
        published: { type: boolean }
        seoTitle: { type: [string, 'null'], maxLength: 200 }
        seoDescription: { type: [string, 'null'], maxLength: 400 }

    UpdateService:
      type: object
      description: A partial update; at least one field must be present.
      additionalProperties: false
      minProperties: 1
      properties:
        slug: { $ref: '#/components/schemas/Slug' }
        title: { type: string, minLength: 2, maxLength: 120 }
        summary: { type: string, minLength: 2, maxLength: 400 }
        body: { type: [string, 'null'], maxLength: 20000 }
        icon: { type: [string, 'null'], maxLength: 60 }
        stack:
          type: array
          items: { type: string, maxLength: 60 }
        deliverables:
          type: array
          items: { type: string, maxLength: 200 }
        timeline: { type: [string, 'null'], maxLength: 120 }
        order: { type: integer, minimum: 0 }
        published: { type: boolean }
        seoTitle: { type: [string, 'null'], maxLength: 200 }
        seoDescription: { type: [string, 'null'], maxLength: 400 }

    AdminIndustry:
      type: object
      required: [id, slug, name, capability, order, published, createdAt, updatedAt]
      additionalProperties: false
      properties:
        id: { type: string }
        slug: { $ref: '#/components/schemas/Slug' }
        name: { type: string, maxLength: 80 }
        capability: { type: string, maxLength: 300 }
        icon: { type: [string, 'null'] }
        order: { type: integer }
        published: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AdminIndustryList:
      type: object
      required: [data, meta]
      additionalProperties: false
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/AdminIndustry' }
        meta: { $ref: '#/components/schemas/PageMeta' }

    CreateIndustry:
      type: object
      required: [slug, name, capability]
      additionalProperties: false
      properties:
        slug: { $ref: '#/components/schemas/Slug' }
        name: { type: string, minLength: 2, maxLength: 80 }
        capability: { type: string, minLength: 2, maxLength: 300 }
        icon: { type: [string, 'null'], maxLength: 60 }
        order: { type: integer, minimum: 0 }
        published: { type: boolean }

    UpdateIndustry:
      type: object
      description: A partial update; at least one field must be present.
      additionalProperties: false
      minProperties: 1
      properties:
        slug: { $ref: '#/components/schemas/Slug' }
        name: { type: string, minLength: 2, maxLength: 80 }
        capability: { type: string, minLength: 2, maxLength: 300 }
        icon: { type: [string, 'null'], maxLength: 60 }
        order: { type: integer, minimum: 0 }
        published: { type: boolean }

    AdminWorkCategory:
      type: object
      required: [id, name, order, createdAt, updatedAt]
      additionalProperties: false
      properties:
        id: { type: string }
        name: { type: string, maxLength: 60 }
        order: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AdminWorkCategoryList:
      type: object
      required: [data]
      additionalProperties: false
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/AdminWorkCategory' }

    CreateWorkCategory:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 2, maxLength: 60 }
        order: { type: integer, minimum: 0 }

    UpdateWorkCategory:
