      additionalProperties: false
      minProperties: 1
      properties:
        name: { type: string, minLength: 2, maxLength: 60 }
        order: { type: integer, minimum: 0 }

    AdminTestimonial:
      type: object
      description: |
        The admin view of a testimonial, including the provenance fields
        (sourceUrl, verifiedAt) the public API deliberately withholds.
      required: [id, author, quote, order, published, createdAt, updatedAt]
      additionalProperties: false
      properties:
        id: { type: string }
        author: { type: string, maxLength: 120 }
        role: { type: [string, 'null'] }
        company: { type: [string, 'null'] }
        quote: { type: string, maxLength: 2000 }
        avatarUrl: { type: [string, 'null'] }
        sourceUrl: { type: [string, 'null'] }
        verifiedAt: { type: [string, 'null'], format: date-time }
        serviceId: { type: [string, 'null'] }
        order: { type: integer }
        published: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AdminTestimonialList:
      type: object
      required: [data, meta]
      additionalProperties: false
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/AdminTestimonial' }
        meta: { $ref: '#/components/schemas/PageMeta' }

    CreateTestimonial:
      type: object
      required: [author, quote]
