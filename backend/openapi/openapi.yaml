        icon: { type: [string, 'null'], maxLength: 60 }
        stack:
          type: array
          items: { type: string, maxLength: 60 }
        deliverables:
          type: array
          items: { type: string, maxLength: 200 }
        timeline: { type: [string, 'null'], maxLength: 120 }
        order: { type: integer, minimum: 0 }
        published: { type: boolean }
        seoTitle: { type: [string, 'null'], maxLength: 200 }
        seoDescription: { type: [string, 'null'], maxLength: 400 }

    UpdateService:
      type: object
