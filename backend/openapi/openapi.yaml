      operationId: adminCreateTestimonial
      summary: Create a testimonial
      description: |
        Publishing requires provenance. A `400` is returned if `published` is true
        while `sourceUrl` or `verifiedAt` is missing — the guard against fabricated
        quotes, enforced server-side, not just in the UI.
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateTestimonial' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminTestimonial' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/testimonials/{id}:
