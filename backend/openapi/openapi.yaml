        author: { type: string, minLength: 2, maxLength: 120 }
        role: { type: [string, 'null'], maxLength: 120 }
        company: { type: [string, 'null'], maxLength: 120 }
        quote: { type: string, minLength: 10, maxLength: 2000 }
        avatarUrl: { type: [string, 'null'], maxLength: 500 }
        sourceUrl: { type: [string, 'null'], maxLength: 500 }
        verifiedAt: { type: [string, 'null'], format: date-time }
        serviceId: { type: [string, 'null'] }
        order: { type: integer, minimum: 0 }
        published: { type: boolean }

    AdminWork:
      type: object
      required: [id, title, category, description, imageUrls, published, createdAt, updatedAt]
      additionalProperties: false
      properties:
        id: { type: string }
        slug: { type: [string, 'null'] }
        title: { type: string, maxLength: 200 }
        category: { type: string, maxLength: 80 }
        description: { type: string }
        imageUrls:
          type: array
          items: { type: string }
        liveUrl: { type: [string, 'null'] }
        published: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AdminWorkList:
      type: object
      required: [data, meta]
      additionalProperties: false
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/AdminWork' }
        meta: { $ref: '#/components/schemas/PageMeta' }

    CreateWork:
      type: object
      required: [slug, title, category, description]
      additionalProperties: false
      properties:
        slug: { $ref: '#/components/schemas/Slug' }
        title: { type: string, minLength: 2, maxLength: 200 }
        category: { type: string, minLength: 1, maxLength: 80 }
        description: { type: string, minLength: 2, maxLength: 20000 }
        imageUrls:
          type: array
          items: { type: string, maxLength: 500 }
        liveUrl: { type: [string, 'null'], maxLength: 500 }
        published: { type: boolean }

    UpdateWork:
      type: object
      description: A partial update; at least one field must be present.
