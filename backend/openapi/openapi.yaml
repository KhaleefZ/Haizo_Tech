openapi: 3.1.0

info:
  title: HaizoTech API
  version: 1.0.0
  description: |
    Single source of truth for the HaizoTech API.

    This spec is **hand-authored and canonical**. Types in `packages/types` and request
    validators in `server/src/schemas/generated` are generated from it, and CI fails if
    regenerating produces a diff. Code-first generation was rejected deliberately: a spec
    derived from the implementation can never catch "the implementation is wrong", which
    is the exact class of bug the previous backend had.

    Conventions, applied without exception:
      * Base path `/v1`.
      * Every error response is an `Error` — one shape, everywhere.
      * Collections return `{ data, meta }`. Page-based for stable content,
        cursor-based for live-inserting feeds (notifications, chat).
      * Every schema lives under `components/schemas` and is `$ref`-ed. No inline objects.
      * Every operation has an `operationId`; the contract test suite asserts each one is
        exercised, and that every mounted Express route appears here.

servers:
  - url: http://localhost:5001/v1
    description: Local
  - url: https://api.haizotech.com/v1
    description: Production

tags:
  - name: Health
  - name: Content
    description: Public read endpoints backing the marketing site.
  - name: Inquiries
  - name: Auth
  - name: Admin
    description: Authenticated content management. Requires a staff session and role.

paths:
  /health:
    get:
      operationId: getHealth
      summary: Liveness and dependency check
      tags: [Health]
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }
        '500':
          $ref: '#/components/responses/InternalError'

  /services:
    get:
      operationId: listServices
      summary: List published services
      tags: [Content]
      security: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: A page of services
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ServiceList' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /services/{slug}:
    get:
      operationId: getServiceBySlug
      summary: Get one published service
      tags: [Content]
      security: []
      parameters:
        - $ref: '#/components/parameters/Slug'
      responses:
        '200':
          description: The service
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Service' }
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /work-categories:
    get:
      operationId: listWorkCategories
      summary: List work categories
      description: |
        Backs the filter row on the public Our Works page. Ordered by `order`, which is what
        the admin Categories manager writes — reordering there changes the public site with
        no deploy.
      tags: [Content]
      security: []
      responses:
        '200':
          description: All categories, ordered
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkCategoryList' }
        '500':
          $ref: '#/components/responses/InternalError'

  /inquiries:
    post:
      operationId: createInquiry
      summary: Submit a contact enquiry
      description: |
        Rate limited per IP and honeypot-protected. `website` is the honeypot field: it is
        never shown to a human, so a non-empty value is treated as a bot and answered with
        `201` to avoid teaching the bot anything.
      tags: [Inquiries]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateInquiry' }
      responses:
        '201':
          description: Enquiry received
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InquiryReceipt' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'

  /analytics/pageview:
    post:
      operationId: recordPageView
      summary: Record a first-party page view (from the marketing site)
      description: Public, rate-limited, no PII. The site beacons a path on navigation.
      tags: [Content]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecordPageView' }
      responses:
        '204': { description: Recorded }
        '400': { $ref: '#/components/responses/BadRequest' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalError' }

  /auth/login:
    post:
      operationId: login
      summary: Authenticate and set session cookies
      description: |
        On success sets `hz_at` (15 min access), `hz_rt` (30 day refresh, scoped to
        `/v1/auth`) and a readable `hz_csrf` value. No token is returned in the body —
        credentials never touch JavaScript.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Authenticated
          headers:
            Set-Cookie:
              description: hz_at, hz_rt and hz_csrf
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CurrentUser' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/me:
    get:
      operationId: getCurrentUser
      summary: The signed-in user
      tags: [Auth]
      responses:
        '200':
          description: The current user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CurrentUser' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/logout:
    post:
      operationId: logout
      summary: Clear session cookies
      description: |
        Clears all three cookies. Idempotent and does not require a valid access
        token — an expired session must still be able to sign out — but it does
        require the CSRF header, so a cross-site page cannot force a logout.
      tags: [Auth]
      security: []
      responses:
        '204':
          description: Signed out
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/refresh:
    post:
      operationId: refresh
      summary: Exchange the refresh cookie for a fresh access token
      description: |
        Reads `hz_rt` (sent only on this path) and, if it is valid and its
        `tokenVersion` still matches the user, issues a new `hz_at` and rotates
        `hz_rt` and `hz_csrf`. Requires the CSRF header. No token is returned in
        the body. A revoked or expired refresh token is a `401`, prompting the
        client to send the user back to the login screen.
      tags: [Auth]
      security: []
      responses:
        '200':
          description: Session refreshed
          headers:
            Set-Cookie:
              description: rotated hz_at, hz_rt and hz_csrf
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CurrentUser' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /industries:
    get:
      operationId: listIndustries
      summary: List published industries
      tags: [Content]
      security: []
      responses:
        '200':
          description: All published industries, ordered
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IndustryList' }
        '500':
          $ref: '#/components/responses/InternalError'

  /testimonials:
    get:
      operationId: listTestimonials
      summary: List published testimonials
      description: |
        Only returns testimonials that are published AND carry provenance. A quote
        without a `sourceUrl` and `verifiedAt` cannot be published, so it can never
        appear here — the guard is in the data, not in the template.
      tags: [Content]
      security: []
      responses:
        '200':
          description: Published, verified testimonials
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TestimonialList' }
        '500':
          $ref: '#/components/responses/InternalError'

  /work:
    get:
      operationId: listWork
      summary: List published case studies
      tags: [Content]
      security: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: category
          in: query
          required: false
          schema: { type: string, maxLength: 80 }
      responses:
        '200':
          description: A page of case studies
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkList' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /blog:
    get:
      operationId: listBlogPosts
      summary: List published blog posts
      tags: [Content]
      security: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: A page of posts
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BlogPostList' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /admin/services:
    get:
      operationId: adminListServices
      summary: List all services, including drafts
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: A page of services
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminServiceList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }
    post:
      operationId: adminCreateService
      summary: Create a service
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateService' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminService' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/services/{id}:
    get:
      operationId: adminGetService
      summary: Get one service by id
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: The service
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminService' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
    patch:
      operationId: adminUpdateService
      summary: Update a service
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateService' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminService' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
    delete:
      operationId: adminDeleteService
      summary: Delete a service
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Deleted
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/industries:
    get:
      operationId: adminListIndustries
      summary: List all industries, including unpublished
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: A page of industries
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminIndustryList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }
    post:
      operationId: adminCreateIndustry
      summary: Create an industry
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateIndustry' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminIndustry' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/industries/{id}:
    get:
      operationId: adminGetIndustry
      summary: Get one industry by id
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: The industry
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminIndustry' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
    patch:
      operationId: adminUpdateIndustry
      summary: Update an industry
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateIndustry' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminIndustry' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
    delete:
      operationId: adminDeleteIndustry
      summary: Delete an industry
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/work-categories:
    get:
      operationId: adminListWorkCategories
      summary: List all work categories
      tags: [Admin]
      responses:
        '200':
          description: All categories, ordered
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminWorkCategoryList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }
    post:
      operationId: adminCreateWorkCategory
      summary: Create a work category
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateWorkCategory' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminWorkCategory' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/work-categories/{id}:
    patch:
      operationId: adminUpdateWorkCategory
      summary: Update a work category
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateWorkCategory' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminWorkCategory' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
    delete:
      operationId: adminDeleteWorkCategory
      summary: Delete a work category
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/testimonials:
    get:
      operationId: adminListTestimonials
      summary: List all testimonials, including unpublished
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: A page of testimonials
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminTestimonialList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }
    post:
      operationId: adminCreateTestimonial
      summary: Create a testimonial
      description: |
        Publishing requires provenance. A `400` is returned if `published` is true
        while `sourceUrl` or `verifiedAt` is missing — the guard against fabricated
        quotes, enforced server-side, not just in the UI.
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateTestimonial' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminTestimonial' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/testimonials/{id}:
    get:
      operationId: adminGetTestimonial
      summary: Get one testimonial by id
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: The testimonial
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminTestimonial' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
    patch:
      operationId: adminUpdateTestimonial
      summary: Update a testimonial
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateTestimonial' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminTestimonial' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
    delete:
      operationId: adminDeleteTestimonial
      summary: Delete a testimonial
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/work:
    get:
      operationId: adminListWork
      summary: List all work, including drafts
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: A page of work
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminWorkList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }
    post:
      operationId: adminCreateWork
      summary: Create a work / case study
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateWork' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminWork' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/work/{id}:
    get:
      operationId: adminGetWork
      summary: Get one work by id
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: The work
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminWork' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
    patch:
      operationId: adminUpdateWork
      summary: Update a work
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateWork' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminWork' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
    delete:
      operationId: adminDeleteWork
      summary: Delete a work
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
